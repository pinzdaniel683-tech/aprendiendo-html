<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semaforo</title>

    <style>
        
        .alineacion {
            margin: auto;
        }
        .circulo{
            border-radius: 50%;
            width: 200px;
            height: 200px;

        }
        .color{
            background-color: red;
        }
        .color_yellow{
            background-color: yellow;
        }
        .color_green{
            background-color: green;
        }
        .color_tabla{
            background-color: black;
        }

        
    </style>

</head>

<body>
    <table width="400px" height="700px" class="alineacion color_tabla">

        <tr>
            <td>
                <div class="circulo alineacion color"></div>
            </td>
        </tr>
        <tr>
            <td>
                <div class="circulo alineacion color_yellow"></div>

            </td>
        </tr>
        <tr>
            <td>
                <div class="circulo alineacion color_green"></div>

            </td>
        </tr>
    </table>
</body>

</html>
